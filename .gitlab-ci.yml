stages:
  - audit
  - lint

variables:
  GITLEAKS_IMAGE: "ghcr.io/gitleaks/gitleaks:latest"
  NODE_IMAGE: "node:20-alpine"
  GIT_DEPTH: "0"

# Lint JS/TS/JSON с Biome
biome:
  stage: lint
  tags:
    - testing
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .npm/
  script:
    - mkdir -p .npm
    - >
      podman run --rm
      -v "$(pwd):/repo:Z" -w /repo
      "$NODE_IMAGE" sh -lc '
        npm ci --cache .npm --prefer-offline --no-audit --fund=false &&
        npx @biomejs/biome@1.8.3 check --write . || true &&
        npx @biomejs/biome@1.8.3 lint --diagnostic-level=error --reporter=summary . \
          > biome-report.txt
      '
  artifacts:
    when: always
    paths:
      - biome-report.txt
    expire_in: 14 days
  allow_failure: true

gitleaks:
  stage: audit
  tags:
    - testing
  script:
    - >
      podman run --rm
      -v "$(pwd):/repo:Z" -w /repo
      "$GITLEAKS_IMAGE" detect
      --redact
      --no-banner
      --source=/repo
      --log-opts="--all"
      --report-format json
      --report-path /repo/gitleaks.json
      --exit-code 1
  artifacts:
    when: always
    paths:
      - gitleaks.json
    reports:
      secret_detection: gitleaks.json
    expire_in: 14 days
